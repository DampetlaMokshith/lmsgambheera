<!DOCTYPE html>
<html>
<head>
    <title>Course Sync Tool</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px 0; background: #0070f3; color: white; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0051a2; }
        #result { margin-top: 20px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: #f9f9f9; }
        .success { border-color: #4caf50; background: #e8f5e8; }
        .error { border-color: #f44336; background: #ffeaea; }
    </style>
</head>
<body>
    <h1>Course Management Tools</h1>
    
    <h2>Sync Courses from Sanity to Supabase</h2>
    <button onclick="syncCourses()">Sync All Courses</button>
    
    <h2>Test Connections</h2>
    <button onclick="testConnections()">Test Full Connection</button>
    <button onclick="testSanity()">Test Sanity Connection</button>
    <button onclick="testSupabase()">Test Supabase Permissions</button>
    
    <div id="result"></div>

    <script>
        async function syncCourses() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Syncing courses...';
            
            try {
                const response = await fetch('/api/sync-courses', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                });
                
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Sync Successful!</h3>
                            <p><strong>Total Courses:</strong> ${result.totalCourses}</p>
                            <p><strong>Successful Syncs:</strong> ${result.successCount}</p>
                            <p><strong>Errors:</strong> ${result.errorCount}</p>
                            <p><strong>Message:</strong> ${result.message}</p>
                            <details>
                                <summary>View Results</summary>
                                <pre>${JSON.stringify(result.results, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Sync Failed</h3>
                            <p><strong>Error:</strong> ${result.error}</p>
                            <p><strong>Message:</strong> ${result.message}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Request Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }

        async function testConnections() {
            await makeRequest('/api/test-full-connection', 'Testing full connections...');
        }

        async function testSanity() {
            await makeRequest('/api/test-sanity-connection', 'Testing Sanity connection...');
        }

        async function testSupabase() {
            await makeRequest('/api/debug-permissions', 'Testing Supabase permissions...');
        }

        async function makeRequest(url, loadingText) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = loadingText;
            
            try {
                const response = await fetch(url);
                const result = await response.json();
                
                if (result.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Test Successful!</h3>
                            <details>
                                <summary>View Results</summary>
                                <pre>${JSON.stringify(result, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>❌ Test Failed</h3>
                            <details>
                                <summary>View Error Details</summary>
                                <pre>${JSON.stringify(result, null, 2)}</pre>
                            </details>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <h3>❌ Request Failed</h3>
                        <p><strong>Error:</strong> ${error.message}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
